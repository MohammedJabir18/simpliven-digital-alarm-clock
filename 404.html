<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Checkout...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0f172a;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: #74121D;
      animation: spin 0.8s ease-in-out infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    a {
      color: #f43f5e;
      text-decoration: underline;
    }
  </style>
  <script>
    (function() {
      var shopifyDomain = "a1vwxm-qr.myshopify.com";
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;

      // If URL is cart or checkout related, redirect to Shopify
      if (path.indexOf('/cart') === 0 || path.indexOf('/checkout') === 0 || path.indexOf('/checkouts') === 0) {
        var destination = "https://" + shopifyDomain + path + search + hash;
        window.location.replace(destination);
      } else {
        // Fallback: Redirect non-existent pages back to landing homepage
        window.location.replace("https://simpliven.com/");
      }
    })();
  </script>
</head>
<body>
  <div class="spinner"></div>
  <h2>Securing your order...</h2>
  <p>Redirecting you to Shopify secure checkout.</p>
  <p><small>If you are not redirected automatically, <a id="manual-link" href="https://a1vwxm-qr.myshopify.com/cart/49072796926187:1">click here</a>.</small></p>
  <script>
    var shopifyDomain = "a1vwxm-qr.myshopify.com";
    var manualLink = document.getElementById('manual-link');
    if (manualLink) {
      manualLink.href = "https://" + shopifyDomain + window.location.pathname + window.location.search;
    }
  </script>
</body>
</html>
